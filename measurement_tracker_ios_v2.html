<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Measurement Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: -apple-system, Arial; margin: 16px; background:#f5f5f7; }
h1 { font-size: 20px; }
input, button { padding: 10px; margin: 5px 0; width: 100%; font-size: 16px; }
.card { background: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
canvas { margin-top: 20px; }
button { background:#007aff; color:white; border:none; border-radius:8px; }
</style>
</head>

<body>

<h1>Measurement Tracker</h1>

<div class="card">
<h3>Add Entry</h3>
<input id="date" type="date">

<input id="flaccidLength" type="number" step="0.1" placeholder="Flaccid Length">
<input id="flaccidGirth" type="number" step="0.1" placeholder="Flaccid Girth">
<input id="erectLength" type="number" step="0.1" placeholder="Erect Length">
<input id="erectGirth" type="number" step="0.1" placeholder="Erect Girth">

<button onclick="addEntry()">Add Entry</button>
</div>

<div class="card">
<h3>Backup</h3>
<button onclick="exportData()">Export Data</button>
<input type="file" id="importFile" onchange="importData(event)">
</div>

<div class="card">
<h3>Data</h3>
<pre id="output"></pre>
</div>

<div class="card">
<h3>Flaccid Length</h3>
<canvas id="chart1"></canvas>
<h3>Flaccid Girth</h3>
<canvas id="chart2"></canvas>
<h3>Erect Length</h3>
<canvas id="chart3"></canvas>
<h3>Erect Girth</h3>
<canvas id="chart4"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data") || "[]");
let charts = {};

function addEntry() {
    const entry = {
        date: document.getElementById("date").value,
        flaccidLength: parseFloat(document.getElementById("flaccidLength").value),
        flaccidGirth: parseFloat(document.getElementById("flaccidGirth").value),
        erectLength: parseFloat(document.getElementById("erectLength").value),
        erectGirth: parseFloat(document.getElementById("erectGirth").value),
    };
    data.push(entry);
    localStorage.setItem("data", JSON.stringify(data));
    render();
}

function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "measurement_data.json";
    a.click();
    URL.revokeObjectURL(url);
}

function importData(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        data = JSON.parse(e.target.result);
        localStorage.setItem("data", JSON.stringify(data));
        render();
    };
    reader.readAsText(file);
}

function render() {
    document.getElementById("output").textContent = JSON.stringify(data, null, 2);

    const labels = data.map(d => d.date);

    createChart("chart1", "Flaccid Length", labels, data.map(d => d.flaccidLength));
    createChart("chart2", "Flaccid Girth", labels, data.map(d => d.flaccidGirth));
    createChart("chart3", "Erect Length", labels, data.map(d => d.erectLength));
    createChart("chart4", "Erect Girth", labels, data.map(d => d.erectGirth));
}

function createChart(id, label, labels, values) {
    if (charts[id]) charts[id].destroy();

    charts[id] = new Chart(document.getElementById(id), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: label,
                data: values,
                borderWidth: 2,
                fill: false
            }]
        },
        options: { responsive: true }
    });
}

render();
</script>

</body>
</html>
